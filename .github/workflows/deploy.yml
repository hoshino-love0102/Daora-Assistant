name: Deploy Daora Assistant

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "index.js,package.json,package-lock.json,ecosystem.config.js,config,handlers,services,store,utils,panelStore.js"
          target: "~/apps/daora-assistant"
          overwrite: true
          rm: false

      - name: Install and restart bot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/daora-assistant
            npm ci --omit=dev
            if pm2 describe daora-assistant > /dev/null; then
              pm2 reload daora-assistant --update-env
            else
              pm2 start ecosystem.config.js
            fi
            pm2 save
